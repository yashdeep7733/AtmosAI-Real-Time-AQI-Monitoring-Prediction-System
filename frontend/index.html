<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AtmosAI</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #0b0b12;
        overflow: hidden;
      }

      #preloader {
        position: fixed;
        width: 100%;
        height: 100%;
        inset: 0;
        background: #0b0b12;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 0.8s ease, visibility 0.8s ease;
      }

      .breathing-ball {
        width: 70px;
        height: 70px;
        min-width: 70px;
        min-height: 70px;
        max-width: 70px;
        max-height: 70px;
        border-radius: 50%;
        background: radial-gradient(circle, #c084fc, #7e22ce);
        display: block;
        flex: none;
        animation: breathe 2s ease-in-out infinite;
      }

      @keyframes breathe {
        0% {
          transform: scale(1);
          box-shadow: 0 0 15px rgba(168, 85, 247, 0.4);
        }
        50% {
          transform: scale(1.3);
          box-shadow: 0 0 45px rgba(168, 85, 247, 0.7);
        }
        100% {
          transform: scale(1);
          box-shadow: 0 0 15px rgba(168, 85, 247, 0.4);
        }
      }

      .hide {
        opacity: 0;
        visibility: hidden;
      }
    </style>
  </head>

  <body>
    <div id="preloader">
      <div class="breathing-ball"></div>
    </div>

    <div id="root"></div>

    <script>
      window.addEventListener("load", function () {
        setTimeout(function () {
          document.getElementById("preloader").classList.add("hide");
          document.body.style.overflow = "auto";
        }, 4000);
      });
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
